<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Video Reveal</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #121212; color: white; }
        #timer { font-size: 3rem; font-weight: bold; margin-bottom: 20px; color: #00ff88; }
        #video-container { display: none; width: 80%; max-width: 800px; }
        video { width: 100%; border-radius: 8px; box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="countdown-wrapper">
        <h2>Video Unlocks In:</h2>
        <div id="timer">Loading...</div>
    </div>

    <div id="video-container">
        <video id="myVideo" controls>
            Your browser does not support the video tag.
        </video>
    </div>

    <script>
        const timerDisplay = document.getElementById('timer');
        const videoContainer = document.getElementById('video-container');
        const countdownWrapper = document.getElementById('countdown-wrapper');
        const videoPlayer = document.getElementById('myVideo');

        async function checkStatus() {
            const response = await fetch('/api/status');
            const data = await response.json();

            if (data.released) {
                revealVideo();
            } else {
                startCountdown(data.timeLeft);
            }
        }

        function startCountdown(ms) {
            let remaining = ms;
            
            const interval = setInterval(() => {
                remaining -= 1000;
                if (remaining <= 0) {
                    clearInterval(interval);
                    revealVideo();
                } else {
                    const hours = Math.floor(remaining / 3600000);
                    const minutes = Math.floor((remaining % 3600000) / 60000);
                    const seconds = Math.floor((remaining % 60000) / 1000);
                    timerDisplay.innerText = `${hours}h ${minutes}m ${seconds}s`;
                }
            }, 1000);
        }

        async function revealVideo() {
            const response = await fetch('/api/video-link');
            if (response.ok) {
                const data = await response.json();
                videoPlayer.src = data.url;
                countdownWrapper.classList.add('hidden');
                videoContainer.style.display = 'block';
            }
        }

        checkStatus();
    </script>
</body>
</html>

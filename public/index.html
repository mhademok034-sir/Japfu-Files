<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Video Vault</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .container { text-align: center; width: 90%; max-width: 850px; }
        
        /* Video Container Styling */
        .video-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 15px; overflow: hidden; background: #000; border: 2px solid #222; transition: all 0.8s ease; }
        .unlocked { border-color: #00ff88; box-shadow: 0 0 30px rgba(0, 255, 136, 0.2); }

        video { width: 100%; height: 100%; filter: blur(15px); pointer-events: none; transition: filter 1s ease; }
        .unlocked video { filter: blur(0); pointer-events: auto; }

        /* Lock Overlay */
        #overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; opacity: 1; transition: opacity 0.8s ease; }
        .hidden { opacity: 0 !important; pointer-events: none; }

        #timer { font-size: clamp(2rem, 8vw, 4rem); font-family: monospace; color: #00ff88; text-shadow: 0 0 10px rgba(0, 255, 136, 0.5); margin: 20px 0; }
        .lock-icon { font-size: 5rem; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        h1 { font-weight: 300; letter-spacing: 4px; color: #aaa; margin-bottom: 2rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>PREMIUM CONTENT RELEASE</h1>
        
        <div class="video-wrapper" id="vault">
            <div id="overlay">
                <div class="lock-icon">🔒</div>
                <div id="timer">00:00:00</div>
                <p style="color: #666; letter-spacing: 2px;">ENCRYPTED ACCESS ONLY</p>
            </div>

            <video id="myVideo" controlsList="nodownload">
                <p>Your browser doesn't support HTML5 video.</p>
            </video>
        </div>
    </div>

    <script>
        const timerDisplay = document.getElementById('timer');
        const overlay = document.getElementById('overlay');
        const vault = document.getElementById('vault');
        const videoPlayer = document.getElementById('myVideo');

        async function init() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                if (data.released) {
                    unlockVideo();
                } else {
                    startCountdown(data.timeLeft);
                }
            } catch (err) {
                timerDisplay.innerText = "OFFLINE";
                console.error("API Error:", err);
            }
        }

        function startCountdown(ms) {
            let remaining = ms;
            const interval = setInterval(() => {
                remaining -= 1000;
                if (remaining <= 0) {
                    clearInterval(interval);
                    unlockVideo();
                } else {
                    const h = Math.floor(remaining / 3600000).toString().padStart(2, '0');
                    const m = Math.floor((remaining % 3600000) / 60000).toString().padStart(2, '0');
                    const s = Math.floor((remaining % 60000) / 1000).toString().padStart(2, '0');
                    timerDisplay.innerText = `${h}:${m}:${s}`;
                }
            }, 1000);
        }

        async function unlockVideo() {
            const res = await fetch('/api/video-link');
            if (res.ok) {
                const data = await res.json();
                videoPlayer.src = data.url;
                videoPlayer.load();
                
                // Visual transitions
                overlay.classList.add('hidden');
                vault.classList.add('unlocked');
                videoPlayer.controls = true;
            }
        }

        init();
    </script>
</body>
</html>
